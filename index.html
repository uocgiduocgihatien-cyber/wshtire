<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SCAN KHO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #f5f5f5;
}
#reader {
  width: 300px;
  margin: auto;
}
button {
  padding: 10px 20px;
  margin: 8px;
  font-size: 16px;
}
#status {
  font-size: 18px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>📷 SCAN KHO</h2>

<button onclick="setMode('IN')">📥 Nhập</button>
<button onclick="setMode('OUT')">📤 Xuất</button>

<br>

<button onclick="switchCamera()">🔄 Đổi camera</button>

<div id="reader"></div>

<p><b>QR:</b></p>
<p id="qrText">Đang chờ...</p>

<p id="status">Đang mở camera...</p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwRe5f7GmJFNld6E5HxdXyPnnOY_S5q3ZENrS950RNsdj65DEwQGAFsm0aq4TeIfxHF/exec"; // 👉 DÁN LINK CỦA BẠN

let html5QrCode;
let currentCamera = "environment";
let mode = "IN";
let lastScan = 0;

// chọn mode
function setMode(m) {
  mode = m;
  document.getElementById("status").innerText = "Chế độ: " + (m === "IN" ? "Nhập" : "Xuất");
}

// mở camera
function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    let camId = devices.find(d =>
      currentCamera === "environment"
        ? d.label.toLowerCase().includes("back")
        : d.label.toLowerCase().includes("front")
    )?.id || devices[0].id;

    html5QrCode.start(
      camId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    document.getElementById("status").innerText = "📷 Sẵn sàng quét";
  });
}

// đổi camera
function switchCamera() {
  currentCamera = currentCamera === "environment" ? "user" : "environment";
  html5QrCode.stop().then(startScanner);
}

// khi quét thành công
function onScanSuccess(decodedText) {
  let now = Date.now();

  if (now - lastScan < 10000) {
    document.getElementById("status").innerText = "⛔ Đợi 10 giây";
    return;
  }

  lastScan = now;

  document.getElementById("qrText").innerText = decodedText;

  fetch(API_URL + "?data=" + encodeURIComponent(decodedText + "|MODE:" + mode))
    .then(res => res.text())
    .then(data => {
      document.getElementById("status").innerText = data;
    })
    .catch(() => {
      document.getElementById("status").innerText = "❌ Lỗi gửi dữ liệu";
    });
}

startScanner();
</script>

</body>
</html>
