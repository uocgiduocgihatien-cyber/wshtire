<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { text-align:center; font-family:Arial; }
#reader { width:300px; margin:auto; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h2>📷 SCAN KHO</h2>

<button onclick="setMode('IN')">📥 Nhập</button>
<button onclick="setMode('OUT')">📤 Xuất</button>
<br>
<button onclick="switchCamera()">🔄 Đổi camera</button>

<div id="reader"></div>

<p>QR: <span id="qrText">...</span></p>
<p id="status">Đang mở camera...</p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwRe5f7GmJFNld6E5HxdXyPnnOY_S5q3ZENrS950RNsdj65DEwQGAFsm0aq4TeIfxHF/exec"; // 👉 DÁN LINK

let html5QrCode;
let cameras = [];
let currentCameraIndex = 0;
let mode = "IN";
let lastScan = 0;

// chọn mode
function setMode(m){
  mode = m;
  document.getElementById("status").innerText =
    "Chế độ: " + (m === "IN" ? "Nhập" : "Xuất");
}

// 🔥 load camera chuẩn
function initCamera(){
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices=>{
    cameras = devices;

    // 🔥 ưu tiên camera sau
    let backIndex = devices.findIndex(cam =>
      cam.label.toLowerCase().includes("back") ||
      cam.label.toLowerCase().includes("rear")
    );

    currentCameraIndex = backIndex !== -1 ? backIndex : 0;

    startCamera();
  });
}

// start camera
function startCamera(){
  html5QrCode.start(
    cameras[currentCameraIndex].id,
    { fps:15, qrbox:250 },
    onScanSuccess
  ).then(()=>{
    document.getElementById("status").innerText = "📷 Sẵn sàng";
  });
}

// đổi camera
function switchCamera(){
  html5QrCode.stop().then(()=>{
    currentCameraIndex = (currentCameraIndex+1)%cameras.length;
    startCamera();
  });
}

// scan thành công
function onScanSuccess(decodedText){

  let now = Date.now();

  if(now - lastScan < 10000){
    document.getElementById("status").innerText = "⛔ Đợi 10 giây";
    return;
  }

  lastScan = now;

  document.getElementById("qrText").innerText = decodedText;

  fetch(API_URL + "?data=" + encodeURIComponent(decodedText + "|MODE:" + mode))
    .then(res=>res.text())
    .then(msg=>{
      document.getElementById("status").innerText = msg;
    })
    .catch(()=>{
      document.getElementById("status").innerText = "❌ Lỗi gửi";
    });
}

// chạy
initCamera();
</script>

</body>
</html>
